<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabra Roleplay - Jugadores Online</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <img src="logo.png" alt="Kabra RP" class="logo">
            <div>
                <h1>Kabra Roleplay</h1>
                <p class="status">
                    <span class="online-dot"></span>
                    Servidor Online
                </p>
            </div>
        </div>
    </header>

    <main class="container">

        <section class="stats">
            <div class="card">
                <h2 id="playerCount">0</h2>
                <p>Jugadores Conectados</p>
            </div>
        </section>

        <section class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Buscar jugador..."
            >
        </section>

        <section class="players-section">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Ping</th>
                        <th>Facción</th>
                    </tr>
                </thead>

                <tbody id="playersTable">
                    <tr>
                        <td colspan="3">Cargando jugadores...</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <footer>
        <p>Kabra Roleplay © 2026</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
